openapi: 3.0.0
info:
  title: Metadata API
  version: 1.0.0
paths:
  /api/metadata/contract-fields:
    get:
      summary: Get all standard and extended contract fields
      responses:
        '200':
          description: List of field metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: {type: integer}
                  message: {type: string}
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        fieldCode: {type: string}
                        fieldName: {type: string}
                        fieldType: {type: string}
                        source: {type: string}
